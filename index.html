<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朝花夕拾小故事 · 乙巳年第壹册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        
        .header {
            height: 56px;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header h1 { font-size: 16px; font-weight: 500; }
        .header .download-btn {
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            transition: background 0.2s;
        }
        .header .download-btn:hover { background: rgba(255,255,255,0.1); }
        
        .pdf-container {
            height: calc(100vh - 56px);
            width: 100%;
        }
        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📖 朝花夕拾小故事 · 乙巳年第壹册</h1>
        <a href="zhaohuaxishi.pdf" download class="download-btn">⬇ 下载 PDF</a>
    </div>
    <div class="pdf-container">
        <iframe src="zhaohuaxishi.pdf#toolbar=1&view=Fit&pagemode=none" type="application/pdf"></iframe>
    </div>
</body>
</html>
